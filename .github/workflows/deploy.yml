        echo "TEST_USER=Kudrjavcev.EA" >> $GITHUB_ENV
        echo "JUMP_HOST=91.240.38.235" >> $GITHUB_ENV
        echo "LOCAL_USER=admin" >> $GITHUB_ENV
        echo "LOCAL_HOST=192.168.137.51" >> $GITHUB_ENV
    - name: Set up SSH key and known hosts
      run: |
        set -x
        mkdir -p ~/.ssh
        echo "$TEST_PRIVATE_KEY" > ~/.ssh/private_key
        chmod 600 ~/.ssh/private_key
        ssh-keyscan -H "$JUMP_HOST" >> ~/.ssh/known_hosts
        ssh-keyscan -H -p 2222 "$LOCAL_HOST" >> ~/.ssh/known_hosts
