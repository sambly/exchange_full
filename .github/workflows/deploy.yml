        echo "Private key content:"
        cat ~/.ssh/private_key
        # Вывод содержимого known_hosts для отладки
        echo "Known hosts content:"
        cat ~/.ssh/known_hosts

        - name: Test SSH connection to jump host
        run: |
          set -x
          ssh -i ~/.ssh/private_key $TEST_USER@$JUMP_HOST "echo 'Connected to jump host'"
  
    - name: Deploy to remote Windows server via jump host
      run: |
        set -x
        ssh -o StrictHostKeyChecking=no -o ProxyCommand="ssh -i ~/.ssh/private_key -W %h:%p $TEST_USER@$JUMP_HOST" -i ~/.ssh/private_key -p 2222 $LOCAL_USER@$LOCAL_HOST << 'EOF'
        cd C:\\Users\\admin\\Desktop\\go\\exchange_full
        docker-compose -f docker-compose.yaml pull
        docker-compose -f docker-compose.yaml up -d
        EOF        
