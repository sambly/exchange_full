name: Deploy to Remote Server via Jump Host

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2
      with:
        submodules: true # Checkout submodules
        token: ${{ secrets.G_TOKEN }} # Use token for submodules   
 
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v1

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker images
      run: docker-compose -f docker-compose.yaml build
      working-directory: ${{ github.workspace }}

    - name: Push Docker images to Docker Hub
      run: docker-compose -f docker-compose.yaml push
      working-directory: ${{ github.workspace }}

    - name: Set up SSH key and known hosts
      run: |
        echo "$SSH_KEY" > private_key.pem
        chmod 600 private_key.pem
        mkdir -p ~/.ssh
        ssh-keyscan -H ${{ secrets.JUMP_HOST }} >> ~/.ssh/known_hosts
        ssh-keyscan -H ${{ secrets.LOCAL_HOST }} >> ~/.ssh/known_hosts

    - name: Display public SSH key (for debugging)
      run: ssh-keygen -y -f private_key.pem
      shell: bash
        
    - name: Deploy to remote Windows server via jump host
      env:
        JUMP_HOST: ${{ secrets.JUMP_HOST }}
        JUMP_USER: ${{ secrets.JUMP_USER }}
        LOCAL_HOST: ${{ secrets.LOCAL_HOST }}
        LOCAL_USER: ${{ secrets.LOCAL_USER }}
        SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      run: |
        ssh -o ProxyCommand="ssh -i private_key.pem -W %h:%p $JUMP_USER@$JUMP_HOST" -i private_key.pem $LOCAL_USER@$LOCAL_HOST << 'EOF'
          cd C:\Users\admin\Desktop\go\exchange_full
          docker-compose -f docker-compose.yaml pull
          docker-compose -f docker-compose.yaml up -d
        EOF
