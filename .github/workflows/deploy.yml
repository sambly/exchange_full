name: Deploy to Remote Server via Jump Host

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2
      with:
        submodules: true # Checkout submodules
        token: ${{ secrets.G_TOKEN }} # Use token for submodules   
 
    - name: Set Git configuration
      run: |
        git config --global user.name "workflow"
        git config --global user.email "kudryavblyzheka@mail.ru"

    - name: Update submodules to latest commit
      run: |
        git submodule sync
        git submodule update --init --recursive
        git submodule foreach --recursive 'git fetch --all'
        #git submodule foreach --recursive 'git merge --allow-unrelated-histories origin/main || :'
  

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v1

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker images
      run: docker-compose -f docker-compose.yaml build
      working-directory: ${{ github.workspace }}

    - name: Push Docker images to Docker Hub
      run: docker-compose -f docker-compose.yaml push
      working-directory: ${{ github.workspace }}

    - name: Set up SSH key and known hosts
      env:
        JUMP_HOST: ${{ secrets.JUMP_HOST }}
        JUMP_USER: ${{ secrets.JUMP_USER }}
        LOCAL_HOST: ${{ secrets.LOCAL_HOST }}
        LOCAL_USER: ${{ secrets.LOCAL_USER }}
        SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      run: |
        set -x
        mkdir -p ~/.ssh
        echo "$SSH_KEY" > ~/.ssh/private_key
        chmod 600 ~/.ssh/private_key
        ssh-keyscan -H $JUMP_HOST >> ~/.ssh/known_hosts
        #ssh-keyscan -H -p 2222 $LOCAL_HOST >> ~/.ssh/known_hosts
       
    - name: Deploy to remote Windows server via jump host
      env:
        JUMP_HOST: ${{ secrets.JUMP_HOST }}
        JUMP_USER: ${{ secrets.JUMP_USER }}
        LOCAL_HOST: ${{ secrets.LOCAL_HOST }}
        LOCAL_USER: ${{ secrets.LOCAL_USER }}
        SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      run: |
        ssh -o StrictHostKeyChecking=no -o ProxyCommand="ssh -i ~/.ssh/private_key -W %h:%p $JUMP_USER@$JUMP_HOST" -i ~/.ssh/private_key -p 2222 $LOCAL_USER@$LOCAL_HOST << 'EOF'
        cd C:\\Users\\admin\\Desktop\\go\\exchange_full
        eval $(docker-machine env default)  # Устанавливает окружение Docker
        echo $DOCKER_PASSWORD | docker login -u $DOCKER_USERNAME --password-stdin
        docker-compose -f docker-compose.yaml pull
        docker-compose -f docker-compose.yaml up -d
        EOF
