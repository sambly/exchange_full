name: Deploy to Remote Server via Jump Host

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v1

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push feeder_app
      run: |
        cd feederApp
        docker build -t sambly/feeder_app:latest .
        docker push sambly/feeder_app:latest

    - name: Build and push exchange_app
      run: |
        cd exchangeBot
        docker build -t sambly/exchange_app:latest .
        docker push sambly/exchange_app:latest

    - name: Deploy to remote Windows server via jump host
      env:
        JUMP_HOST: ${{ secrets.JUMP_HOST }}
        JUMP_USER: ${{ secrets.JUMP_USER }}
        LOCAL_HOST: ${{ secrets.LOCAL_HOST }}
        LOCAL_USER: ${{ secrets.LOCAL_USER }}
        SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      run: |
        echo "$SSH_KEY" > private_key.pem
        chmod 600 private_key.pem
        ssh -o ProxyCommand="ssh -i private_key.pem -W %h:%p $JUMP_USER@$JUMP_HOST" -i private_key.pem $LOCAL_USER@$LOCAL_HOST powershell << 'EOF'
          cd C:\Users\admin\Desktop\go\exchange_full
          docker-compose pull
          docker-compose up -d
        EOF

    - name: Notify failure
      if: failure()
      uses: actions/github-script@v4
      with:
        script: |
          const { github } = require('@actions/github');
          github.rest.issues.createComment({
            issue_number: 1,
            owner: github.context.repo.owner,
            repo: github.context.repo.repo,
            body: 'Deployment failed. Please check the workflow logs for details.'
          });

    - name: Notify success
      if: success()
      uses: actions/github-script@v4
      with:
        script: |
          const { github } = require('@actions/github');
          github.rest.issues.createComment({
            issue_number: 1,
            owner: github.context.repo.owner,
            repo: github.context.repo.repo,
            body: 'Deployment succeeded.'
          });
