name: edit-version-tags

# EXCHANGE_BOT_TAG=v1.0.0 or latest
# FEEDER_APP_TAG=v1.0.0 or latest
# EXCHANGE_SERVICE_TAG=v1.0.0 or latest


on:
  workflow_dispatch:
    inputs:
      exchange_bot_tag:
        description: 'Exchange Bot Docker tag (e.g., v1.2.3)'
        required: true
        default: 'latest'
      feeder_app_tag:
        description: 'Feeder App Docker tag'
        required: true
        default: 'latest'
      exchange_service_tag:
        description: 'Exchange Service Docker tag'
        required: true
        default: 'latest'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Set up SSH key and known hosts
      env:
        JUMP_HOST: ${{ secrets.JUMP_HOST }}
        JUMP_USER: ${{ secrets.JUMP_USER }}
        LOCAL_HOST: ${{ secrets.LOCAL_HOST }}
        LOCAL_USER: ${{ secrets.LOCAL_USER }}
        SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      run: |
        set -x
        mkdir -p ~/.ssh
        echo "$SSH_KEY" > ~/.ssh/private_key
        chmod 600 ~/.ssh/private_key
        ssh-keyscan -H $JUMP_HOST >> ~/.ssh/known_hosts
        #ssh-keyscan -H -p 2222 $LOCAL_HOST >> ~/.ssh/known_hosts
       
    - name: Deploy to remote Windows server via jump host
      env:
        JUMP_HOST: ${{ secrets.JUMP_HOST }}
        JUMP_USER: ${{ secrets.JUMP_USER }}
        LOCAL_HOST: ${{ secrets.LOCAL_HOST }}
        LOCAL_USER: ${{ secrets.LOCAL_USER }}
        SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      run: |
        ssh -o StrictHostKeyChecking=no -o ProxyCommand="ssh -i ~/.ssh/private_key -W %h:%p $JUMP_USER@$JUMP_HOST" -i ~/.ssh/private_key -p 2222 $LOCAL_USER@$LOCAL_HOST << 'EOF'
        cd C:\\Users\\admin\\Desktop\\go\\exchange_full
        printf "\n\n" >> .env     
        echo EXCHANGE_BOT_TAG=${{ github.event.inputs.exchange_bot_tag }} >> .env
        echo FEEDER_APP_TAG=${{ github.event.inputs.feeder_app_tag }} >> .env
        echo EXCHANGE_SERVICE_TAG=${{ github.event.inputs.exchange_service_tag }} >> .env
        printf "\n" >> .env
        EOF
