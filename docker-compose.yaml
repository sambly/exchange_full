name: exchangebot-full

services:

  feeder-app:
    build:
      container_name: feeder-app
      context: ./feederapp
      args:
        GITHUB_TOKEN: ${GITHUB_TOKEN}    
    image: sambly/feeder-app:${FEEDER_APP_TAG:-latest}  
    volumes:
      - ./log/feederapp:/app/log
    environment:
      ENVIRONMENT: docker
    env_file:
      - .env
    depends_on:
        exchange-service:
          condition: service_healthy
    networks:
      - shared_network

  exchange-service:
    container_name: exchange-service  
    build: ./exchangeService
    image: sambly/exchange-service:${EXCHANGE_SERVICE_TAG:-latest}
    volumes:
      - ./log/exchangeService:/app/log
    ports:
      - "${GRPC_HOST_PORT:-50052}:${GRPC_PORT:-50051}"  
    environment:
      ENVIRONMENT: docker
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
      OTEL_SERVICE_NAME: exchange-service
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${HTTP_PORT:-8080}/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    depends_on:
      mysql:
        condition: service_healthy
      otel-collector:
        condition: service_started 
    networks:
      - shared_network
  
  exchangebot:
    container_name: exchangebot  
    build:
      context: ./exchangebot
      args:
        GITHUB_TOKEN: ${GITHUB_TOKEN}
        VITE_GRAFANA_URL: ${VITE_GRAFANA_URL:-grafana}
    image: sambly/exchangebot:${EXCHANGE_BOT_TAG:-latest}  
    volumes:
    - ./log/exchangebot:/app/log
    - ./configs:/app/configs
    ports:
      - "${HOST_PORT:-8080}:${CONTAINER_PORT:-80}"
    environment:
      ENVIRONMENT: docker
    env_file:
      - .env
    depends_on:
        exchange-service:
          condition: service_healthy
    networks:
      - shared_network

  mysql:
    container_name: mysql
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "${DB_PORT_HOST:-3307}:${DB_PORT:-3306}"
    volumes:
      - mysql_data_exchange_full:/var/lib/mysql
    networks:
      - shared_network
    healthcheck:
      test: ["CMD-SHELL", "mysql --silent -u root -p$$MYSQL_ROOT_PASSWORD -e 'SELECT 1'"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 100s
  loki:
    image: grafana/loki:2.9.2
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/loki-config.yaml
    volumes:
      - ./logService/loki-config.yaml:/etc/loki/loki-config.yaml
      - loki_data:/loki  # Том для хранения данных
    networks:
      - shared_network

  promtail:
    image: grafana/promtail:2.9.2
    volumes:
      - ./logService/promtail-config.yaml:/etc/promtail/promtail-config.yaml
      - ./log:/app/log  
      - /var/log:/var/log
    command: -config.file=/etc/promtail/promtail-config.yaml
    depends_on:
      - loki
    networks:
      - shared_network
  
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:      
      - GF_SERVER_ROOT_URL=${BASE_URL_GRAFANA}/trade/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    depends_on:
      - loki
    networks:
      - shared_network

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.101.0
    command:
      - "--config"
      - "/otel-local-config.yaml"
    volumes:
      - ./configs/collector.config.yaml:/otel-local-config.yaml
    ports:
      - 4317:4317
    depends_on:
      jaeger:
        condition: service_started
    networks:
      - shared_network 

  jaeger:
    image: jaegertracing/all-in-one:latest
    restart: unless-stopped
    ports:
      - 16686:16686
      - 16685:16685
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    healthcheck:
      test: ["CMD", "wget", "--spider", "localhost:16686"]
      interval: 1s
      timeout: 3s
      retries: 60
    networks:
      - shared_network

volumes:
  mysql_data_exchange_full:
  loki_data:
  grafana_data:  

networks:
  shared_network:
    driver: bridge
