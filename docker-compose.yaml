version: '3.9'

services:
  feeder_app:
    build: ./feederApp
    image: sambly/feeder_app:latest
    volumes:
      - ./log/feeder_app:/app/log
    environment:
      ENVIRONMENT: docker
      DB_HOST_Docker: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - shared_network

  exchange_app:
    build: ./exchangeBot
    image: sambly/exchange_app:latest
    volumes:
    - ./log/exchange_app:/app/log
    ports:
      - "444:444"
    environment:
      ENVIRONMENT: docker
      serverName: ${serverName}
      production: ${production}
      inProductionOnlyApp: ${inProductionOnlyApp}
      inProductionWithFrontedNgingx: ${inProductionWithFrontedNgingx}
      httpPortProduction: ${httpPortProduction}
      hostWeb: ${hostWeb}
      usernameAuth: ${usernameAuth}
      passwordAuth: ${passwordAuth}
      API_KEY: ${API_KEY}
      API_SECRET: ${API_SECRET}
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
      TELEGRAM_USER: ${TELEGRAM_USER}
      DB_HOST_Docker: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
    depends_on:
      - feeder_app
    networks:
      - shared_network

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data_exchange_full:/var/lib/mysql
    networks:
      - shared_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "--silent"]
      interval: 10s
      timeout: 10s
      retries: 3

volumes:
  mysql_data_exchange_full:

networks:
  shared_network:
